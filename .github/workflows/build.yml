name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APKs
        run: gradle :app:assembleDebug :app:assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: coloros-feiniu-bridge-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: coloros-feiniu-bridge-release-unsigned
          path: app/build/outputs/apk/release/*.apk
